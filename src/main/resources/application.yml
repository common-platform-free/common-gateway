server:
  port: 9000

spring:
  application:
    name: common-gateway
  cloud:
    gateway:
      routes:
        - id: iam-service
          uri: http://localhost:9001
          predicates:
            - Path=/iam/**
        - id: business-service
          uri: http://localhost:9002
          predicates:
            - Path=/business/**

gateway:
  auth:
    access-token-cookie-name: access_token
    white-list:
      - /iam/auth/login
      - /iam/auth/refresh
      - /iam/auth/logout
      - /iam/actuator/health

jwt:
  public-key-url: ${IAM_JWT_PUBLIC_KEY_URL:http://localhost:9001/iam/internal/jwt/public-key}
  public-key-fetch-timeout-seconds: 5
